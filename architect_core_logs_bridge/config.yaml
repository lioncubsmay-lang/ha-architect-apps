name: "Architect Core Logs Bridge"
description: "Expose Home Assistant Core logs for Architect V2.1"
version: "0.1.1"
slug: "architect_core_logs_bridge"
init: false
startup: services
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  8099/tcp: 8099
hassio_api: true
homeassistant_api: true
hassio_role: default
